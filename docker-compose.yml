# ─────────────────────────────────────────────────────────────────────────────
# Roofly — frontend stack (Phase 2: mock-first, no backend yet).
#
# MySQL / Redis / RabbitMQ services land back when Phase 3 (Laravel backend)
# starts. For now the frontend runs against typed mocks via NUXT_PUBLIC_USE_MOCK.
#
# Usage:
#   cp .env.example .env       # set per-environment values
#   docker compose up -d --build
# ─────────────────────────────────────────────────────────────────────────────

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-roofly}-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./frontend:/app
      # Keep container's node_modules and .nuxt isolated from host
      - frontend_node_modules:/app/node_modules
      - frontend_nuxt:/app/.nuxt
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
      - PORT=3000
      # Per-environment values come from each VPS clone's local .env (gitignored).
      # Defaults are production-safe so a fresh clone with no .env serves prod
      # behavior — never accidentally leaks demo widgets to real customers.
      # See .env.example for what to set per environment (demo / uat / production).
      - NUXT_PUBLIC_APP_ENV=${NUXT_PUBLIC_APP_ENV:-production}
      - NUXT_PUBLIC_USE_MOCK=${NUXT_PUBLIC_USE_MOCK:-false}
      - NUXT_PUBLIC_DEMO_FEEDBACK_URL=${NUXT_PUBLIC_DEMO_FEEDBACK_URL:-}

volumes:
  frontend_node_modules:
  frontend_nuxt:
