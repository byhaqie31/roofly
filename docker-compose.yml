# ─────────────────────────────────────────────────────────────────────────────
# Roofly — local development stack.
#
# Phase 1.1: data services only (mysql, redis, rabbitmq).
# Backend (php-fpm) and frontend (node) services land in their respective
# install commits, alongside their Dockerfiles.
#
# Usage:
#   cp .env.example .env
#   docker compose up -d
# ─────────────────────────────────────────────────────────────────────────────

services:
  mysql:
    image: mysql:8.0
    container_name: roofly-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "${MYSQL_PORT}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - roofly

  redis:
    image: redis:7-alpine
    container_name: roofly-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - roofly

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: roofly-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    ports:
      - "${RABBITMQ_PORT}:5672"
      - "${RABBITMQ_MGMT_PORT}:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - roofly

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: roofly-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT}:3000"
    volumes:
      - ./frontend:/app
      # Keep container's node_modules and .nuxt isolated from host
      - frontend_node_modules:/app/node_modules
      - frontend_nuxt:/app/.nuxt
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
      - PORT=3000
      # Per-environment values come from each VPS clone's local .env (gitignored).
      # Defaults are production-safe so a fresh clone with no .env serves prod
      # behavior — never accidentally leaks demo widgets to real customers.
      # See .env.example for what to set per environment (demo / uat / production).
      - NUXT_PUBLIC_APP_ENV=${NUXT_PUBLIC_APP_ENV:-production}
      - NUXT_PUBLIC_USE_MOCK=${NUXT_PUBLIC_USE_MOCK:-false}
      - NUXT_PUBLIC_DEMO_FEEDBACK_URL=${NUXT_PUBLIC_DEMO_FEEDBACK_URL:-}
    networks:
      - roofly

volumes:
  mysql_data:
  redis_data:
  rabbitmq_data:
  frontend_node_modules:
  frontend_nuxt:

networks:
  roofly:
    driver: bridge
