# Roofly demo — production stack for demo.roofly.my.
# Frontend-only (Phase 1.1). Reverse-proxied by Nginx on the VPS at host port 3001.

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: demo-roofly
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
      - PORT=3000
      # Show owner/tenant quick-login shortcuts on demo.roofly.my login page.
      # Real prod (when main deploys) will not set this and shortcuts stay hidden.
      - NUXT_PUBLIC_DEMO_MODE=true
